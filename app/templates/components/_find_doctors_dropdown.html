<style>
/* --- Premium Mega Menu (SSOT) --- */
.nav-dropdown {
    position: relative;
}

.mega-menu {
    position: absolute;
    top: 150%;
    left: -150px;
    width: 700px;
    background: var(--white, #ffffff);
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    display: flex;
    opacity: 0;
    visibility: hidden;
    transform: translateY(20px);
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    z-index: 1000;
    border: 1px solid var(--border, #eaeaea);
    overflow: hidden;
    padding: 24px;
    gap: 24px;
}

.nav-dropdown:hover .mega-menu {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
    top: 100%;
}

.mega-left {
    width: 200px;
    border-right: 1px solid var(--border, #eaeaea);
    padding-right: 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.mega-left h4 {
    font-size: 18px;
    color: var(--text-dark, #1f2937);
    margin: 0 0 16px 0;
    font-weight: 600;
}

.mega-right {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.mega-item {
    display: flex;
    align-items: center;
    padding: 12px;
    border: 1px solid var(--border, #eaeaea);
    border-radius: 12px;
    transition: all 0.2s;
    cursor: pointer;
    text-decoration: none !important;
}

.mega-item:hover {
    background: var(--bg-light, #f8f9fa);
    border-color: rgba(16, 185, 129, 0.3);
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.02);
}

.mega-item-icon {
    width: 32px;
    height: 32px;
    margin-right: 12px;
    object-fit: contain;
    mix-blend-mode: multiply; /* Removes white background from icon images */
}

.mega-item span {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dark, #1f2937);
    transition: color 0.2s;
}

.mega-item:hover span {
    color: #10b981;
}

/* Fix inheritance inside Bootstrap navbars */
.mega-menu * {
    text-align: left;
}
</style>

    </div>
    <div class="mega-right">
