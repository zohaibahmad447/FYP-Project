<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Payment — Quick Care</title>
    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ecfdf5 0%, #f8fafc 50%, #ecfdf5 100%);
            color: #0f172a;
        }

        .box {
            text-align: center;
            padding: 2rem 1.75rem;
            max-width: 420px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(15, 23, 42, 0.12);
            border: 1px solid #e2e8f0;
        }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }

        h1 {
            font-size: 1.15rem;
            font-weight: 700;
            margin: 0 0 0.5rem;
            color: #047857;
        }

        p {
            margin: 0 0 1rem;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #475569;
        }

        .sub {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        #fallback {
            display: none;
            margin-top: 1.25rem;
        }

        #fallback a {
            color: #059669;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="icon">{% if status in ('paid', 'already_paid') %}✓{% elif status == 'processing' %}⏳{% elif status == 'cancelled' %}↩{% elif status == 'error' %}⚠{% else %}ℹ️{% endif %}</div>
        <h1>{{ heading }}</h1>
        <p>{{ message }}</p>
        <p class="sub" id="closing-hint">This window will close automatically…</p>
        <div id="fallback">
            <a href="{{ return_url }}">Return to your appointment</a>
        </div>
    </div>
    <script>
        (function () {
            var appointmentId = {{ appointment_id | tojson }};
            var status = {{ status | tojson }};
            var closeDelay = {{ close_delay_ms | int }};
            var payload = {
                type: 'quickcare-safepay-return',
                appointmentId: appointmentId,
                status: status
            };
            var targetOrigin = window.location.origin;
            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage(payload, targetOrigin);
                }
            } catch (e) { /* ignore */ }

            function tryClose() {
                try {
                    window.close();
                } catch (e) { /* ignore */ }
            }

            setTimeout(tryClose, closeDelay);

            setTimeout(function () {
                var fb = document.getElementById('fallback');
                var hint = document.getElementById('closing-hint');
                if (fb) fb.style.display = 'block';
                if (hint) hint.style.display = 'none';
            }, closeDelay + 700);
        })();
    </script>
</body>

</html>
