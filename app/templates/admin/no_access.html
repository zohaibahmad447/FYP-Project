{% extends "base.html" %}

{% block title %}No Access - Admin Panel{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm rounded-4 text-center p-5">
                <i class="fas fa-lock fa-3x text-muted mb-3"></i>
                <h3 class="fw-bold">No panel access</h3>
                <p class="text-muted mb-4">Your staff account does not have any assigned panels yet. Please contact the super administrator.</p>
                <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-secondary rounded-pill">Sign out</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
